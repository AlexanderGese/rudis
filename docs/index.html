<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>rudis — a redis clone in your browser</title>
<style>
  :root { --bg:#0b0e14; --panel:#0d111a; --line:#1f2733; --dim:#5b6878; --txt:#c8d3e0;
    --green:#6ee787; --cyan:#56d4dd; --mag:#d2a8ff; --red:#f85149; --accent:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:26px 16px; }
  h1 { margin:0; font-size:21px; color:#e6edf3; } h1 .x { color:var(--red); }
  .sub { color:var(--dim); margin:4px 0 18px; font-size:13px; }
  .term { width:min(720px,95vw); background:var(--panel); border:1px solid var(--line);
    border-radius:10px; overflow:hidden; box-shadow:0 8px 40px #0006; }
  .bar { display:flex; gap:14px; padding:8px 14px; background:#11151f; border-bottom:1px solid var(--line);
    font-size:12px; color:var(--dim); }
  .bar b { color:var(--txt); }
  #out { height:380px; overflow-y:auto; padding:14px; white-space:pre-wrap; }
  #out .cmd { color:var(--mag); } #out .int { color:var(--cyan); } #out .str { color:var(--txt); }
  #out .ok { color:var(--green); } #out .err { color:var(--red); } #out .nil { color:var(--dim); }
  .inp { display:flex; align-items:center; border-top:1px solid var(--line); padding:10px 14px; }
  .inp span { color:var(--mag); margin-right:8px; }
  #line { flex:1; background:none; border:none; color:var(--txt); font:inherit; outline:none; }
  a { color:var(--accent); } footer { margin-top:16px; color:var(--dim); font-size:12px; }
</style>
</head>
<body>
  <h1>rudis<span class="x">·</span>repl</h1>
  <div class="sub">a from-scratch Redis-compatible server — its command engine, running in your browser</div>

  <div class="term">
    <div class="bar">
      <span>keys <b id="s-keys">0</b></span>
      <span>strings <b id="s-str">0</b></span>
      <span>lists <b id="s-list">0</b></span>
      <span>hashes <b id="s-hash">0</b></span>
      <span>commands <b id="s-cmds">0</b></span>
      <span>hit-rate <b id="s-rate">0</b>%</span>
    </div>
    <div id="out"></div>
    <div class="inp"><span>rudis&gt;</span><input id="line" autofocus spellcheck="false" autocomplete="off" /></div>
  </div>

  <footer>open source · <a href="https://github.com/AlexanderGese/rudis">github.com/AlexanderGese/rudis</a> · point real redis-cli at the native server</footer>

<script type="module">
import init, { Db } from './pkg/rudis_web.js';

const out = document.getElementById('out');
const line = document.getElementById('line');
let db = null;

function classify(reply) {
  if (reply.startsWith('(integer)')) return 'int';
  if (reply.startsWith('(error)')) return 'err';
  if (reply === '(nil)' || reply.startsWith('(empty')) return 'nil';
  if (reply === 'OK' || reply === 'PONG' || /^(string|list|hash|none)$/.test(reply)) return 'ok';
  return 'str';
}

function print(text, cls) {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

function refreshStats() {
  const s = JSON.parse(db.stats());
  document.getElementById('s-keys').textContent = s.keys;
  document.getElementById('s-str').textContent = s.strings;
  document.getElementById('s-list').textContent = s.lists;
  document.getElementById('s-hash').textContent = s.hashes;
  document.getElementById('s-cmds').textContent = s.cmds;
  document.getElementById('s-rate').textContent = s.rate;
}

function exec(cmd) {
  print('rudis> ' + cmd, 'cmd');
  const reply = db.exec(cmd, Date.now());
  if (reply !== '') print(reply, classify(reply));
  refreshStats();
}

line.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = line.value.trim();
    line.value = '';
    if (cmd) exec(cmd);
  }
});
document.querySelector('.term').onclick = () => line.focus();

init().then(() => {
  db = new Db();
  print('connected to rudis (in-browser). try the commands below, or anything you know from redis:', 'nil');
  ['SET name ada', 'GET name', 'INCR visits', 'INCR visits', 'RPUSH todo wake code sleep', 'LRANGE todo 0 -1', 'HSET user age 30 city berlin', 'HGETALL user'].forEach(exec);
});
</script>
</body>
</html>
